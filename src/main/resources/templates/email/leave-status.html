<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 40px auto; background: #ffffff; border-radius: 8px; padding: 40px; }
    .header { text-align: center; margin-bottom: 32px; }
    .header h1 { color: #1a1a2e; font-size: 24px; margin: 0; }
    .content { color: #333333; line-height: 1.6; }
    .detail-box { background: #f9f9f9; border-left: 4px solid #4f46e5; padding: 16px 20px; border-radius: 4px; margin: 20px 0; }
    .detail-box p { margin: 6px 0; }
    .status-approved { color: #16a34a; font-weight: bold; }
    .status-rejected { color: #dc2626; font-weight: bold; }
    .footer { margin-top: 40px; font-size: 12px; color: #999999; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Leave Request Update</h1>
    </div>
    <div class="content">
      <p>Hi <strong>{{THERAPIST_NAME}}</strong>,</p>
      <p>Your leave request has been <span class="status-{{STATUS_CLASS}}">{{STATUS}}</span>.</p>
      <div class="detail-box">
        <p><strong>Date:</strong> {{LEAVE_DATE}}</p>
        <p><strong>Type:</strong> {{LEAVE_TYPE}}</p>
        <p><strong>Reviewed by:</strong> {{REVIEWER_NAME}}</p>
      </div>
    </div>
    <div class="footer">
      <p>For questions, please contact your administrator.</p>
    </div>
  </div>
</body>
</html>
