<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appointment Confirmed</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f5f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f4f5f7;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <img src="{{LOGO_URL}}" alt="{{ORG_NAME}}" height="44" style="height:44px;display:block;border:0;" />
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background:#ffffff;border-radius:16px;padding:40px;box-shadow:0 1px 4px rgba(0,0,0,0.08);">

              <!-- Badge -->
              <div style="display:inline-block;padding:5px 14px;background-color:#dcfce7;border:1px solid #bbf7d0;border-radius:20px;margin-bottom:20px;">
                <span style="font-size:12px;font-weight:600;color:#166534;text-transform:uppercase;letter-spacing:0.05em;">Appointment Confirmed</span>
              </div>

              <!-- Heading -->
              <h1 style="margin:0 0 6px;font-size:22px;font-weight:700;color:#111827;letter-spacing:-0.3px;">
                Your appointment is booked
              </h1>
              <p style="margin:0 0 28px;font-size:14px;color:#6b7280;">
                {{ORG_NAME}}
              </p>

              <!-- Details table -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;margin-bottom:28px;">
                <tr style="background:#f9fafb;">
                  <td style="padding:10px 16px;font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.05em;width:36%;">Patient</td>
                  <td style="padding:10px 16px;font-size:14px;color:#111827;font-weight:600;">{{PATIENT_NAME}}</td>
                </tr>
                <tr style="border-top:1px solid #e5e7eb;">
                  <td style="padding:10px 16px;font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.05em;">Therapist</td>
                  <td style="padding:10px 16px;font-size:14px;color:#111827;">{{THERAPIST_NAME}}</td>
                </tr>
                <tr style="border-top:1px solid #e5e7eb;background:#f9fafb;">
                  <td style="padding:10px 16px;font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.05em;">Date</td>
                  <td style="padding:10px 16px;font-size:14px;color:#111827;">{{DATE}}</td>
                </tr>
                <tr style="border-top:1px solid #e5e7eb;">
                  <td style="padding:10px 16px;font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.05em;">Time</td>
                  <td style="padding:10px 16px;font-size:14px;color:#111827;">{{TIME}}</td>
                </tr>
                <tr style="border-top:1px solid #e5e7eb;background:#f9fafb;">
                  <td style="padding:10px 16px;font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.05em;">Clinic</td>
                  <td style="padding:10px 16px;font-size:14px;color:#111827;">{{CLINIC_NAME}}</td>
                </tr>
              </table>

              <p style="margin:0;font-size:13px;color:#6b7280;text-align:center;line-height:1.6;">
                To reschedule or cancel, please contact the clinic directly.
              </p>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:20px 0 0;text-align:center;font-size:12px;color:#9ca3af;line-height:1.6;">
              &copy; {{ORG_NAME}}. All rights reserved.
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
