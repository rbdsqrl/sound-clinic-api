<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 40px auto; background: #ffffff; border-radius: 8px; padding: 40px; }
    .header { text-align: center; margin-bottom: 32px; }
    .header h1 { color: #1a1a2e; font-size: 24px; margin: 0; }
    .content { color: #333333; line-height: 1.6; }
    .button-wrap { text-align: center; margin: 28px 0; }
    .button { display: inline-block; padding: 14px 32px; background: #4f46e5; color: #ffffff; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 15px; }
    .footer { margin-top: 40px; font-size: 12px; color: #999999; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Welcome to {{ORG_NAME}}!</h1>
    </div>
    <div class="content">
      <p>Hi <strong>{{FIRST_NAME}}</strong>,</p>
      <p>Your account has been created successfully. You can now log in and get started.</p>
      <div class="button-wrap">
        <a href="{{LOGIN_URL}}" class="button">Log In</a>
      </div>
    </div>
    <div class="footer">
      <p>If you did not create this account, please contact your administrator immediately.</p>
    </div>
  </div>
</body>
</html>
