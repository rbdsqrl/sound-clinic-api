<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome!</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f5f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f4f5f7;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <img src="{{LOGO_URL}}" alt="{{ORG_NAME}}" height="44" style="height:44px;display:block;border:0;" />
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background:#ffffff;border-radius:16px;padding:40px;box-shadow:0 1px 4px rgba(0,0,0,0.08);">

              <!-- Heading -->
              <h1 style="margin:0 0 6px;font-size:22px;font-weight:700;color:#111827;text-align:center;letter-spacing:-0.3px;">
                Welcome to {{ORG_NAME}}!
              </h1>
              <p style="margin:0 0 32px;font-size:13px;color:#9ca3af;text-align:center;">
                Your account is ready
              </p>

              <!-- Body -->
              <p style="margin:0 0 12px;font-size:15px;color:#374151;line-height:1.65;">
                Hi <strong style="color:#111827;">{{FIRST_NAME}}</strong>,
              </p>
              <p style="margin:0 0 28px;font-size:15px;color:#374151;line-height:1.65;">
                Your account has been created successfully. Click the button below to log in and get started.
              </p>

              <!-- CTA Button -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="padding-bottom:32px;">
                    <a href="{{LOGIN_URL}}"
                       style="display:inline-block;padding:14px 40px;background-color:#6366f1;color:#ffffff;text-decoration:none;border-radius:10px;font-size:15px;font-weight:600;letter-spacing:0.01em;">
                      Log In
                    </a>
                  </td>
                </tr>
              </table>

              <!-- Divider -->
              <hr style="border:none;border-top:1px solid #e5e7eb;margin:0 0 20px;" />

              <p style="margin:0;font-size:13px;color:#6b7280;text-align:center;line-height:1.6;">
                If you did not create this account, please contact your administrator immediately.
              </p>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:20px 0 0;text-align:center;font-size:12px;color:#9ca3af;line-height:1.6;">
              &copy; {{ORG_NAME}}. All rights reserved.
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
