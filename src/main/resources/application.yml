spring:
  application:
    name: simple-hearing-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/simplehearing}
    username: ${DB_USER:simplehearing}
    password: ${DB_PASS:simplehearing}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.zaxxer.hikari.pool.HikariPool: ERROR

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
  jwt:
    secret: ${JWT_SECRET:bXlTdXBlclNlY3JldEtleUZvckpXVEFuZEl0SXNWZXJ5TG9uZ0Vub3VnaA==}
    access-token-expiry: 900       # 15 minutes in seconds
    refresh-token-expiry: 604800   # 7 days in seconds
  storage:
    local-path: ${STORAGE_PATH:./uploads}
  # Single-org deployment: the org-id assigned to all public (unauthenticated) inquiries.
  # Set ORG_ID env var in production. Leave blank during dev — controller handles null gracefully.
  org-id: ${ORG_ID:}
