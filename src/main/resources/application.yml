spring:
  application:
    name: simple-hearing-api
    # redeploy trigger
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/simplehearing}
    username: ${DB_USER:simplehearing}
    password: ${DB_PASS:simplehearing}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.zaxxer.hikari.pool.HikariPool: ERROR

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173,https://sound-clinic-website.nanil-mines.workers.dev
  jwt:
    secret: ${JWT_SECRET:bXlTdXBlclNlY3JldEtleUZvckpXVEFuZEl0SXNWZXJ5TG9uZ0Vub3VnaA==}
    access-token-expiry: 900       # 15 minutes in seconds
    refresh-token-expiry: 604800   # 7 days in seconds
  storage:
    provider: local            # dev default — override to 's3' in production via STORAGE_PROVIDER env var
    base-url: ${BASE_URL:http://localhost:8080}
    local:
      base-dir: ${user.home}/.simplehearing/uploads
    # ── S3 / Supabase Storage (active when provider=s3) ─────────────────────
    # Set STORAGE_PROVIDER=s3 and the vars below in production:
    s3:
      endpoint: ${STORAGE_S3_ENDPOINT:}           # Supabase: https://<ref>.supabase.co/storage/v1/s3
      bucket: ${STORAGE_S3_BUCKET:}               # bucket name in Supabase Storage
      region: ${STORAGE_S3_REGION:ap-south-1}     # any valid region string (Supabase ignores it)
      access-key-id: ${STORAGE_S3_ACCESS_KEY_ID:}
      secret-access-key: ${STORAGE_S3_SECRET_KEY:}
      force-path-style: ${STORAGE_S3_FORCE_PATH_STYLE:true}  # must be true for Supabase
      public-url-base: ${STORAGE_S3_PUBLIC_URL_BASE:}        # https://<ref>.supabase.co/storage/v1/object/public/<bucket>
  email:
    from-address: ${EMAIL_FROM:noreply@simplehearing.com}
    from-name: ${EMAIL_FROM_NAME:Simple Hearing}
    base-url: ${FRONTEND_URL:http://localhost:3000}
    api-key: ${BREVO_API_KEY:}
  # Single-org deployment: the org-id assigned to all public (unauthenticated) inquiries.
  # Set ORG_ID env var in production. Leave blank during dev — controller handles null gracefully.
  org-id: ${ORG_ID:}
