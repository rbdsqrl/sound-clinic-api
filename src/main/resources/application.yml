spring:
  application:
    name: simple-hearing-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/simplehearing}
    username: ${DB_USER:simplehearing}
    password: ${DB_PASS:simplehearing}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    test-connection: false
    properties:
      mail.smtp.auth: ${SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${SMTP_STARTTLS:false}
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.zaxxer.hikari.pool.HikariPool: ERROR

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173,https://sound-clinic-website.nanil-mines.workers.dev
  jwt:
    secret: ${JWT_SECRET:bXlTdXBlclNlY3JldEtleUZvckpXVEFuZEl0SXNWZXJ5TG9uZ0Vub3VnaA==}
    access-token-expiry: 900       # 15 minutes in seconds
    refresh-token-expiry: 604800   # 7 days in seconds
  storage:
    provider: local            # 'local' (default) or 's3'
    base-url: ${BASE_URL:http://localhost:8080}
    local:
      base-dir: ${user.home}/.simplehearing/uploads
    # ── Switch to S3 in production ──────────────────────────────────────────
    # provider: s3
    # s3:
    #   bucket: ${STORAGE_S3_BUCKET}
    #   region: ${STORAGE_S3_REGION:ap-south-1}
    #   access-key-id: ${AWS_ACCESS_KEY_ID}
    #   secret-access-key: ${AWS_SECRET_ACCESS_KEY}
  email:
    from-address: ${EMAIL_FROM:noreply@simplehearing.com}
    from-name: ${EMAIL_FROM_NAME:Simple Hearing}
    base-url: ${BASE_URL:http://localhost:3000}
  # Single-org deployment: the org-id assigned to all public (unauthenticated) inquiries.
  # Set ORG_ID env var in production. Leave blank during dev — controller handles null gracefully.
  org-id: ${ORG_ID:}
