name: Build, Push & Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: clinic-dev-493107
  REGION: asia-south1
  REPO_NAME: my-repo
  IMAGE_NAME: spring-app
  SERVICE_NAME: clinic-app
  IMAGE: asia-south1-docker.pkg.dev/clinic-dev-493107/my-repo/spring-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Build JAR ─────────────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run unit tests and generate coverage
        run: mvn -B clean test jacoco:report

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco

      - name: Build Spring Boot JAR
        run: mvn -B package -DskipTests -q

      - name: Upload built JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple-hearing-api-jar
          path: target/simple-hearing-api-*.jar

      # ── GCP Auth ─────────────────────────────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/1009595418726/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-sa@clinic-dev-493107.iam.gserviceaccount.com'

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # ── Docker tags ───────────────────────────────────────────────────────────
      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # ── Build & push ──────────────────────────────────────────────────────────
      - name: Compute short SHA
        id: short-sha
        run: echo "value=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy to Cloud Run ───────────────────────────────────────────────────
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:sha-${{ steps.short-sha.outputs.value }}
          flags: '--allow-unauthenticated --min-instances=0 --max-instances=1 --memory=512Mi'

  # ── Publish coverage to GitHub Pages ─────────────────────────────────────────
  publish-pages:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      contents: write
      id-token: write

    steps:
      - name: Download coverage report artifact
        uses: actions/download-artifact@v4
        with:
          name: jacoco-coverage-report
          path: coverage-site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: coverage-site

      - name: Deploy coverage site to GitHub Pages
        uses: actions/deploy-pages@v4
