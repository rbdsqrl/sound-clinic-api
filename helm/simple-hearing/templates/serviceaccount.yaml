{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "simple-hearing.labels" . | nindent 4 }}
  annotations:
    # Workload Identity — lets this K8s SA act as the GCP service account
    iam.gke.io/gcp-service-account: {{ .Values.serviceAccount.gcpServiceAccount }}
{{- end }}
