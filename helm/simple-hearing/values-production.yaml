# ── Production overrides ──────────────────────────────────────────────────────
# Apply with: helm upgrade --install ... -f values.yaml -f values-production.yaml

replicaCount: 2

image:
  pullPolicy: Always

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

resources:
  requests:
    cpu: 500m
    memory: 768Mi
  limits:
    cpu: 1000m
    memory: 1Gi
